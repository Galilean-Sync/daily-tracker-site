<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Tracker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f1ea;
      color: #222;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .hero {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      line-height: 1.5;
    }

    .form-box {
      background: white;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    iframe {
      width: 100%;
      height: 900px;
      border: none;
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <h1>Daily Tracker</h1>
      <p>A simple check-in page for logging sleep, brain fog, exercise and alcohol.</p>
    </section>

    <section class="form-box">
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeyFRYj5PW1wC4c9uqIxF7AXAyCWyxd43DWicrI6OaPjsL1gg/viewform?embedded=true">
        Loading…
      </iframe>
    </section>
  </main>
</body>
</html>
